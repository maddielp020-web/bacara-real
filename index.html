<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bienvenido | Bacará Real</title>
    
    <!-- GLOBAL (base) -->
    <link rel="stylesheet" href="global.css">
    
    <!-- ESPECÍFICO DE BIENVENIDA -->
    <link rel="stylesheet" href="css/bienvenida.css">
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor bienvenida-container">
        
        <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
        <!-- EFECTOS NEBLINA EN BORDES -->
    <div class="borde-neblina">
        <div class="izquierdo"></div>
        <div class="derecho"></div>
    </div>
        
        <!-- ==================== OVERLAY DORADO ==================== -->
        <div class="bienvenida-overlay fade-in"></div>
        
        <!-- ==================== CONTENIDO PRINCIPAL ==================== -->
        <div class="bienvenida-contenido slide-up">
            
            <!-- Logo o emblema -->
            <div class="bienvenida-emblema">
                <span class="emblema-carta">♠️</span>
                <span class="emblema-carta">♣️</span>
                <span class="emblema-carta">♥️</span>
                <span class="emblema-carta">♦️</span>
            </div>
            
            <!-- Título principal -->
            <h1 class="bienvenida-titulo">
                <span class="titulo-linea">BACARÁ</span>
                <span class="titulo-linea dorado">REAL</span>
            </h1>
            
            <!-- Descripción -->
            <p class="bienvenida-descripcion">
                Club privado de Bacará.<br>
                Solo por invitación.
            </p>

            <!-- ==================== DIVISOR CON FRANJA DE LUZ ==================== -->
            <div class="bienvenida-divisor"></div>
            
           <!-- ==================== NUEVO: FORMULARIO DE ACCESO ==================== -->
<div class="acceso-container">
    
    <!-- Campo CÓDIGO (con estructura completa) -->
    <div class="campo-container">
        <label class="campo-label">🔑 CÓDIGO DE INVITACIÓN</label>
        <input type="text" class="campo-input" id="codigo-input" placeholder="Ej: INV-123">
        <div class="mensaje-error" id="codigo-error"></div>
    </div>
    
    <!-- Campo TELÉFONO con prefijo +7 fijo -->
    <div class="campo-container" id="telefono-container">
        <label class="campo-label">📱 TELÉFONO (mismo del banco)</label>
        <div class="telefono-wrapper">
            <span class="telefono-prefijo">+7</span>
            <input type="tel" class="campo-input telefono-input" id="telefono-input" placeholder="___ ___ __ __" maxlength="10">
        </div>
        <div class="campo-ayuda">Tu teléfono es solo para transferencias. Nunca se comparte.</div>
        <div class="mensaje-error" id="telefono-error"></div>
    </div>
    
    <!-- Botón principal -->
    <button class="btn bienvenida-btn" id="btn-principal" disabled>
        <span class="btn-texto" id="btn-texto">VERIFICAR Y CONTINUAR</span>
    </button>
    <!-- Botón términos -->
    <button class="btn bienvenida-btn" id="btn-terminos" disabled>
        📜 TÉRMINOS Y CONDICIONES
    </button>
</div>       
            <!-- Versión -->
            <p class="bienvenida-version">v1.0 · exclusivo</p>
        </div>
    </div>
    
    <!-- ==================== MODAL DE CONFIRMACIÓN ==================== -->
        <div class="modal-overlay" id="modal-cerrar-bienvenida" style="display: none;">
            <div class="modal-contenido">
                <div class="modal-header">
                    <span class="modal-icono">❓</span>
                    <h3 class="modal-titulo">¿CERRAR APLICACIÓN?</h3>
                </div>
                <div class="modal-body">
                    <p>¿Estás seguro que quieres salir de Bacará Real?</p>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal btn-modal-no" id="modal-no-bienvenida">NO</button>
                    <button class="btn-modal btn-modal-si" id="modal-si-bienvenida">SÍ</button>
                </div>
            </div>
        </div>
    
    <!-- ==================== SCRIPTS ==================== -->
<script src="js/bienvenida.js"></script>
</body>
</html>
