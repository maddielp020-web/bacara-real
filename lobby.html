<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lobby | Bacará Real</title>
    
    <!-- GLOBAL (siempre primero) -->
    <link rel="stylesheet" href="global.css">
    
    <!-- ESPECÍFICO DE LOBBY -->
    <link rel="stylesheet" href="css/lobby.css">
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FORZADO FINAL contra Telegram -->
    <link rel="stylesheet" href="css/telegram-fixes.css">
</head>
<body>
    <div class="contenedor lobby-container">
        
        <!-- ==================== PARTÍCULAS (3 SUTILES) ==================== -->
        <div class="particula-luz"></div>
        <div class="particula-luz"></div>
        <div class="particula-luz"></div>
        
        <!-- ==================== HEADER LOBBY ==================== -->
        <header class="lobby-header">
            <button class="btn-nav btn-volver-lobby" id="btn-volver-lobby" aria-label="Volver a Términos">←</button>
            <h1 class="lobby-titulo">🎰 BACARÁ REAL</h1>
            <div class="lobby-saldo">
                <div class="lobby-saldo">
    <div class="lobby-saldo" id="contenedor-saldo">
    <span class="saldo-icono">🪙</span>
    <span class="saldo-cantidad" id="saldo-usuario">0</span>
</div>
        </header>

        <!-- ==================== IDENTIDAD DEL JUGADOR ==================== -->
        <div class="lobby-usuario" id="usuario-info">
            <span class="usuario-icono">👤</span>
            <span class="usuario-nombre" id="usuario-nombre">@usuario_telegram</span>
            <!-- Admin badge (se muestra con clase .oculto por defecto) -->
            <span class="admin-badge oculto" id="admin-badge">👑 ADMIN</span>
        </div>

        <!-- ==================== SELECTOR DE MONTO ==================== -->
        <div class="selector-monto">
            <h2 class="selector-titulo">¿Con cuánto quieres jugar?</h2>
            
            <!-- ==================== SUBTÍTULO CON ANIMACIÓN ==================== -->
            <div class="selector-rapido">
                <span class="flecha">⬇️</span>
                <span class="rapido-texto">SELECCIÓN RÁPIDA</span>
                <span class="flecha">⬇️</span>
            </div>
            
            <div class="botones-monto">
                <button class="btn-monto" data-monto="500">500₽</button>
                <button class="btn-monto" data-monto="1000">1000₽</button>
                <button class="btn-monto" data-monto="1500">1500₽</button>
                <button class="btn-monto" data-monto="2000">2000₽</button>
            </div>
            
            <div class="monto-personalizado">
                <label for="monto-input" class="monto-label">Coloca aquí la cifra para empezar (múltiplo de 50)</label>
                <input type="number" id="monto-input" class="monto-input" placeholder="Ej: 750 ₽" min="200" step="50">
                <div class="monto-feedback" id="monto-feedback"></div>
            </div>
        </div>

        <!-- ==================== MENSAJE DE ERROR DE MESAS ==================== -->
        <div class="mesas-error oculto" id="mesas-error"></div>

        <!-- ==================== LISTA DE MESAS (GENERADA POR JS) ==================== -->
        <div class="mesas-container">
            <h2 class="mesas-titulo">MESAS DISPONIBLES:</h2>
            <div class="mesas-lista" id="mesas-lista"></div>
        </div>

        <!-- ==================== FOOTER ==================== -->
        <footer class="lobby-footer">
            <p class="footer-version">v1.0 · exclusivo</p>
        </footer>
    </div>

    <script src="js/lobby.js"></script>
</body>
</html>
